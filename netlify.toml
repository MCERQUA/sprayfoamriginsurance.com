[build]
  command = "pnpm run build"
  # Static export output dir — REQUIRED for Netlify Forms capture (see next.config).
  publish = "out"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "18"

# NOTE: @netlify/plugin-nextjs INTENTIONALLY OMITTED — its runtime intercepts
# form POSTs and breaks Netlify Forms lead capture. Do NOT add it.

[[notifications]]
  event = "submission_created"
  url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=sprayfoamriginsurance.com"
  form = "quote"

[[notifications]]
  event = "submission_created"
  url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=sprayfoamriginsurance.com"
  form = "contact"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
